[pytest]
testpaths = tests
addopts = -q
filterwarnings =
    ignore::UserWarning
    ignore::FutureWarning
    ignore::DeprecationWarning
    ; spurious BLAS FPE flags from numpy 2.0 matmul on small/degenerate test data
    ignore:.*encountered in matmul:RuntimeWarning
    ignore:.*Variables are collinear:UserWarning
